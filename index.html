<!-- This is the HTML file for the 3D homepage using Spline. It includes a 3D model and a sound effect on click. -->
<!-- The page redirects to a transition page after a delay. -->
<!-- The Spline viewer is embedded, and the sound effect is played when a specific object in the 3D scene is clicked. -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>3D Homepage</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background-color: black;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>

  <canvas id="canvas3d"></canvas>

  <script type="module">
    import { Application } from 'https://unpkg.com/@splinetool/runtime@0.9.484/build/runtime.js';

    const canvas = document.getElementById('canvas3d');
    const app = new Application(canvas);

    app.load('https://prod.spline.design/0hYoAaAJ6DD8vOLf/scene.splinecode');

    app.addEventListener('mouseDown', (e) => {
      if (e.target?.name === 'Enterbutton') {
        const audio = new Audio('enter.mp3'); // Make sure the file exists!
        audio.play();

        setTimeout(() => {
          window.location.href = 'transition.html';
        }, 1000);
      }
    });
  </script>

</body>
</html>
