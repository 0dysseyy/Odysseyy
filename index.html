<!-- This is the HTML file for the 3D homepage using Spline. It includes a 3D model and a sound effect on click. -->
<!-- The page redirects to a transition page after a delay. -->
<!-- The Spline viewer is embedded, and the sound effect is played when a specific object in the 3D scene is clicked. -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>3D Homepage</title>
  <script type="module" src="https://unpkg.com/@splinetool/viewer@1.9.94/build/spline-viewer.js"></script>
  <style>
    html, body {
      margin: 0;
      height: 100%;
    }
    spline-viewer {
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>
</head>
<body>

    <spline-viewer url="https://prod.spline.design/0hYoAaAJ6DD8vOLf/scene.splinecode"></spline-viewer>

<script>
  <spline-viewer id="spline" url="https://prod.spline.design/0hYoAaAJ6DD8vOLf/scene.splinecode"></spline-viewer>


  viewer.addEventListener('load', () => {
    // Listen for custom event emitted from Spline
    viewer.addEventListener('mouseDown', (event) => {
      // Replace with the actual object name in your scene
      if (event.detail?.target?.name === 'Enterbutton') {
        // Play the sound
        const audio = new Audio('Spline 3D/enter.mp3'); // replace with your actual file
        audio.play();

        // Wait before redirecting to transition page
        setTimeout(() => {
          window.location.href = 'transition.html';
        }, 1000); // 1 second delay
      }
    });
  });
</script>

</body>
</html>
