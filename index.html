<!-- This is the HTML file for the 3D homepage using Spline. It includes a 3D model and a sound effect on click. -->
<!-- The page redirects to a transition page after a delay. -->
<!-- The Spline viewer is embedded, and the sound effect is played when a specific object in the 3D scene is clicked. -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>3D Homepage</title>
  <script type="module" src="https://unpkg.com/@splinetool/viewer@1.10.9/build/spline-viewer.js"></script>
  <style>
    html, body {
      margin: 0; padding: 0; height: 100%; background: black;
      overflow: hidden;
    }
    spline-viewer {
      width: 100%; height: 100%; display: block;
    }
    /* Fade out effect on body */
    body.fade-out {
      opacity: 0;
      transition: opacity 1s ease;
    }
  </style>
</head>
<body>

  <spline-viewer id="viewer" url="https://prod.spline.design/0hYoAaAJ6DD8vOLf/scene.splinecode"></spline-viewer>

  <script>
    const viewer = document.getElementById('viewer');

    // --- AUDIO TEST: Uncomment to test audio plays on page load ---
     const testAudio = new Audio('enter.mp3');
    testAudio.play().catch(err => console.error('Audio test play error:', err));

    viewer.addEventListener('load', () => {
      console.log('Spline scene loaded');

      viewer.addEventListener('mouseDown', (event) => {
        const clickedName = event.detail?.target?.name;
        console.log('Clicked object:', clickedName);

        if (clickedName === 'Enterbutton') {
          alert('Enterbutton clicked!');  // Debug alert to confirm click fires
          console.log('Enterbutton clicked - playing audio');

          const audio = new Audio('enter.mp3');
          audio.play()
            .then(() => {
              console.log('Audio started playing');
              audio.onended = () => {
                console.log('Audio ended, fading out and redirecting');
                document.body.classList.add('fade-out');
                setTimeout(() => {
                  window.location.href = 'transition.html';
                }, 1000); // wait for fade-out transition
              };
            })
            .catch(err => {
              console.error('Audio play error:', err);
              // fallback: redirect immediately
              window.location.href = 'transition.html';
            });
        }
      });
    });
  </script>

</body>
</html>
