<!-- This is the HTML file for the 3D homepage using Spline. It includes a 3D model and a sound effect on click. -->
<!-- The page redirects to a transition page after a delay. -->
<!-- The Spline viewer is embedded, and the sound effect is played when a specific object in the 3D scene is clicked. -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Debug 3D Click & Audio</title>
<script type="module" src="https://unpkg.com/@splinetool/viewer@1.10.9/build/spline-viewer.js"></script>
<style>
  html, body { margin:0; padding:0; height:100%; background:#000; overflow:hidden; color:#fff; font-family: sans-serif;}
</style>
</head>
<body>
  <spline-viewer id="viewer" url="https://prod.spline.design/0hYoAaAJ6DD8vOLf/scene.splinecode"></spline-viewer>
  <div style="position:absolute;top:10px;left:10px;">Open console before clicking "Enter"</div>

  <script>
    const viewer = document.getElementById('viewer');
    viewer.addEventListener('load', () => {
      console.log('✅ Spline loaded');
      
      viewer.addEventListener('mouseDown', (e) => {
        console.log('mouseDown event:', e);
      });

      viewer.addEventListener('click', (e) => {
        console.log('click event:', e);
        const name = e.detail?.target?.name || '(no name)';
        console.log('Clicked object name:', name);
        
        if (name === 'Enterbutton') {
          console.log('🎯 "Enterbutton" was clicked!');
          
          const audio = new Audio('enter.mp3');
          audio.preload = 'auto';
          audio.load();

          audio.addEventListener('canplaythrough', () => {
            console.log('-- audio ready to play');
            audio.play()
              .then(() => console.log('-- audio started'))
              .catch(err => console.error('-- audio.play error:', err));
          });

          audio.addEventListener('ended', () => {
            console.log('-- audio ended playback');
          });

          audio.addEventListener('error', (err) => {
            console.error('-- audio ERROR', err);
          });
        }
      });
    });
  </script>
</body>
</html>
