<!-- This is the HTML file for the 3D homepage using Spline. It includes a 3D model and a sound effect on click. -->
<!-- The page redirects to a transition page after a delay. -->
<!-- The Spline viewer is embedded, and the sound effect is played when a specific object in the 3D scene is clicked. -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Odysseyy Debug</title>
  <script type="module" src="https://unpkg.com/@splinetool/viewer@1.10.9/build/spline-viewer.js"></script>
  <style>
    html, body { margin: 0; height: 100%; background: black; overflow: hidden; color: white; font-family: sans-serif; }
    body.fade-out { opacity: 0; transition: opacity 1s ease; }
  </style>
</head>
<body>
  <spline-viewer id="viewer" url="https://prod.spline.design/0hYoAaAJ6DD8vOLf/scene.splinecode"></spline-viewer>

  <script>
    const viewer = document.getElementById('viewer');

    viewer.addEventListener('load', () => {
      console.log('✅ Spline loaded');

      viewer.addEventListener('mouseDown', (event) => {
        const name = event.detail?.target?.name;
        console.log('🖱️ Clicked on:', name);

        if (name === 'Enter' || name === 'Enterbutton') {
          console.log('🎯 Detected "Enter" click');

          const audio = new Audio('https://raw.githubusercontent.com/0dysseyy/Odysseyy/main/enter.mp3');

          audio.addEventListener('canplaythrough', () => {
            console.log('-- audio ready');
            audio.play().then(() => {
              console.log('-- audio playing...');
              audio.onended = () => {
                console.log('-- audio done, redirecting...');
                document.body.classList.add('fade-out');
                setTimeout(() => {
                  window.location.href = 'transition.html';
                }, 1000);
              };
            }).catch(err => {
              console.error('-- audio play failed:', err);
              window.location.href = 'transition.html';
            });
          });

          audio.addEventListener('error', (e) => {
            console.error('-- audio error:', e);
          });
        }
      });
    });
  </script>
</body>
</html>
