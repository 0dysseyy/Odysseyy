<!-- This is the HTML file for the 3D homepage using Spline. It includes a 3D model and a sound effect on click. -->
<!-- The page redirects to a transition page after a delay. -->
<!-- The Spline viewer is embedded, and the sound effect is played when a specific object in the 3D scene is clicked. -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Odyssey</title>
  <style>
    body {
      margin: 0;
      background-color: black;
      transition: opacity 2s ease;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <canvas id="canvas3d"></canvas>

  <script type="module">
    import { Application } from "https://unpkg.com/@splinetool/runtime/build/runtime.js";

    const canvas = document.getElementById("canvas3d");
    const app = new Application(canvas);
    app.load("https://prod.spline.design/46dee007-d308-4917-b17f-06dca4e5fc1f/scene.splinecode");

    app.addEventListener("onLoad", () => {
      console.log("✅ Spline scene loaded");
    });

    app.addEventListener("onMouseDown", (e) => {
      console.log("🖱️ Clicked on:", e.target.name);

      if (e.target.name === "Enterbutton") {
        const audio = new Audio("https://raw.githubusercontent.com/0dysseyy/Odysseyy/main/enter.mp3");
        audio.volume = 1.0;
        audio.play();
        console.log("🔊 Audio started");

        // Fade out
        document.body.style.opacity = "0";

        // Wait 2 seconds before redirect
        setTimeout(() => {
          window.location.href = "Directory.html";
        }, 2000);
      }
    });
  </script>
</body>
</html>
