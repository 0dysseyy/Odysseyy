<!-- This is the HTML file for the 3D homepage using Spline. It includes a 3D model and a sound effect on click. -->
<!-- The page redirects to a transition page after a delay. -->
<!-- The Spline viewer is embedded, and the sound effect is played when a specific object in the 3D scene is clicked. -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>3D Homepage</title>

  <!-- Polyfill for Import Maps -->
  <script async src="https://unpkg.com/es-module-shims@2.6.0/dist/es-module-shims.js"></script>

  <!-- Import Map for @splinetool/runtime -->
  <script type="importmap">
    {
      "imports": {
        "@splinetool/runtime": "https://unpkg.com/@splinetool/runtime@1.10.10/build/runtime.js"
      }
    }
  </script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background-color: black;
      opacity: 1;
      transition: opacity 1.5s ease;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .fade-out {
      opacity: 0;
    }
  </style>
</head>
<body>
  <canvas id="canvas3d"></canvas>

  <script type="module">
    import { Application } from "@splinetool/runtime";

    const canvas = document.getElementById("canvas3d");
    const app = new Application(canvas);

    let isRedirecting = false;

    app.load("https://prod.spline.design/0hYoAaAJ6DD8vOLf/scene.splinecode");

    app.addEventListener("onLoad", () => {
      console.log("✅ Spline loaded");

      app.addEventListener("onMouseDown", (e) => {
        if (isRedirecting) return;

        const clicked = e.target?.name;
        console.log("🖱️ Clicked:", clicked);

        if (clicked === "Enterbutton") {
          isRedirecting = true;

          const audio = new Audio("https://raw.githubusercontent.com/0dysseyy/Odysseyy/main/enter.mp3");

          audio.addEventListener("canplaythrough", () => {
            audio.play().then(() => {
              console.log("🔊 Audio playing...");
            });
          });

          audio.addEventListener("ended", () => {
            console.log("🔚 Audio ended, starting fade out");
            document.body.classList.add("fade-out");

            setTimeout(() => {
              window.location.href = "transition.html";
            }, 1500); // match fade duration
          });

          // Force redirect if something fails after 10s
          setTimeout(() => {
            if (isRedirecting) {
              console.warn("⚠️ Audio delay fallback - redirecting...");
              document.body.classList.add("fade-out");
              setTimeout(() => {
                window.location.href = "transition.html";
              }, 1500);
            }
          }, 10000);
        }
      });
    });
  </script>
</body>
</html>
