<!-- This is the HTML file for the 3D homepage using Spline. It includes a 3D model and a sound effect on click. -->
<!-- The page redirects to a transition page after a delay. -->
<!-- The Spline viewer is embedded, and the sound effect is played when a specific object in the 3D scene is clicked. -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>3D Homepage</title>
  <script type="module" src="https://unpkg.com/@splinetool/viewer@1.9.94/build/spline-viewer.js"></script>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background-color: black;
      position: relative;
    }
    spline-viewer {
      width: 100%;
      height: 100%;
      display: block;
    }
    /* Black overlay for fade */
    #fadeOverlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: black;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1.5s ease;
      z-index: 9999;
    }
    #fadeOverlay.active {
      opacity: 1;
      pointer-events: auto;
    }
  </style>
</head>
<body>

  <spline-viewer id="spline" url="https://prod.spline.design/0hYoAaAJ6DD8vOLf/scene.splinecode"></spline-viewer>
  <div id="fadeOverlay"></div>

<script>
  const viewer = document.getElementById('spline');
  const fadeOverlay = document.getElementById('fadeOverlay');
  let isRedirecting = false;

  // Preload audio so it’s ready to play instantly
  const audio = new Audio('enter.mp3');
  audio.preload = 'auto';

  viewer.addEventListener('load', () => {
    viewer.addEventListener('mouseDown', (event) => {
      if (isRedirecting) return;
      if (event.detail?.target?.name === 'Enterbutton') {
        isRedirecting = true;
        console.log('Enterbutton clicked: playing audio and preparing redirect');

        // Play audio
        audio.play().catch(e => console.error('Audio play failed:', e));

        // When audio ends, fade out and redirect
        audio.onended = () => {
          console.log('Audio ended, starting fade out');
          fadeOverlay.classList.add('active');
          setTimeout(() => {
            console.log('Redirecting now');
            window.location.href = 'transition.html';
          }, 1500);  // match fade duration
        };

        // Fallback redirect in case audio doesn’t end for some reason
        setTimeout(() => {
          if (isRedirecting) {
            console.log('Fallback redirect triggered');
            fadeOverlay.classList.add('active');
            setTimeout(() => {
              window.location.href = 'transition.html';
            }, 1500);
          }
        }, 10000);
      }
    });
  });
</script>

</body>
</html>
