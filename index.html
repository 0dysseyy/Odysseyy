<!-- This is the HTML file for the 3D homepage using Spline. It includes a 3D model and a sound effect on click. -->
<!-- The page redirects to a transition page after a delay. -->
<!-- The Spline viewer is embedded, and the sound effect is played when a specific object in the 3D scene is clicked. -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>3D Homepage</title>
  <script type="module" src="https://unpkg.com/@splinetool/viewer@1.10.9/build/spline-viewer.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    spline-viewer {
      width: 100%;
      height: 100%;
      display: block;
    }

    body.fade-out {
      opacity: 0;
      transition: opacity 1s ease;
    }
  </style>
</head>
<body>

  <spline-viewer
    id="viewer"
    url="https://prod.spline.design/0hYoAaAJ6DD8vOLf/scene.splinecode">
  </spline-viewer>

  <script>
    const viewer = document.getElementById('viewer');

    viewer.addEventListener('load', () => {
      console.log('Spline scene loaded');

      viewer.addEventListener('mouseDown', (event) => {
        const clickedName = event.detail?.target?.name;
        console.log('Clicked object:', clickedName);

        if (clickedName === 'Enterbutton') {
          console.log('Enterbutton clicked - playing audio');

          const audio = new Audio('https://raw.githubusercontent.com/0dysseyy/Odysseyy/main/enter.mp3');

          audio.play().then(() => {
            console.log('Audio is playing...');
          }).catch(err => {
            console.error('Error playing audio:', err);
            window.location.href = 'transition.html';
            return;
          });

          // When audio finishes, trigger fade out and redirect
          audio.onended = () => {
            console.log('Audio finished - fading out');
            document.body.classList.add('fade-out');
            setTimeout(() => {
              window.location.href = 'transition.html';
            }, 1000); // match the CSS fade duration
          };
        }
      });
    });
  </script>

</body>
</html>
