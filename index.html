<!-- This is the HTML file for the 3D homepage using Spline. It includes a 3D model and a sound effect on click. -->
<!-- The page redirects to a transition page after a delay. -->
<!-- The Spline viewer is embedded, and the sound effect is played when a specific object in the 3D scene is clicked. -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>3D Homepage</title>
  <!-- Use latest Spline Viewer runtime -->
  <script type="module" src="https://unpkg.com/@splinetool/viewer@latest/build/spline-viewer.js"></script>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background-color: black;
      transition: opacity 1.5s ease;
      opacity: 1;
    }
    spline-viewer {
      width: 100%;
      height: 100%;
      display: block;
    }
    /* Fade out class */
    .fade-out {
      opacity: 0;
    }
  </style>
</head>
<body>

  <spline-viewer id="spline" url="https://prod.spline.design/0hYoAaAJ6DD8vOLf/scene.splinecode"></spline-viewer>

<script>
  const viewer = document.getElementById('spline');
  let isRedirecting = false;

  viewer.addEventListener('load', () => {
    viewer.addEventListener('mouseDown', (event) => {
      if (isRedirecting) return;

      if (event.detail?.target?.name === 'Enterbutton') {
        isRedirecting = true;
        
        const audio = new Audio('https://raw.githubusercontent.com/0dysseyy/Odysseyy/main/enter.mp3');

        audio.addEventListener('canplaythrough', () => {
          audio.play();
        });

        audio.addEventListener('ended', () => {
          document.body.classList.add('fade-out');
          setTimeout(() => {
            window.location.href = 'transition.html';
          }, 1500);
        });

        setTimeout(() => {
          if (audio.paused) {
            audio.play();
          }
        }, 1000);

        setTimeout(() => {
          if (isRedirecting) {
            document.body.classList.add('fade-out');
            setTimeout(() => {
              window.location.href = 'transition.html';
            }, 1500);
          }
        }, 10000);
      }
    });
  });
</script>

</body>
</html>
