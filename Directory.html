<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Directory</title>
  <link rel="stylesheet" href="styles.css" />
  <script type="module" src="https://unpkg.com/@splinetool/viewer@1.9.94/build/spline-viewer.js"></script>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
    }
    spline-viewer {
      width: 100%;
      height: 100vh;
      display: block;
    }
  </style>
</head>
<body>

  <!-- 3D Directory Embed -->
  <spline-viewer 
    id="spline" 
    url="https://prod.spline.design/rOoNKAXx1CIhH091Ek4o0aes/scene.splinecode">
  </spline-viewer>

  <script>
    const viewer = document.getElementById('spline');

    viewer.addEventListener('load', () => {
      viewer.addEventListener('mouseDown', (event) => {
        const clicked = event.detail?.target?.name;

        if (clicked === 'About') {
          window.location.href = 'About.html';
        } else if (clicked === 'Film') {
          window.location.href = 'film.html';
        } else if (clicked === 'Contact') {
          window.location.href = 'Contact.html';
        }
      });
    });
  </script>
</body>
</html>
