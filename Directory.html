<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Odyssey Navigation</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: black;
      overflow: hidden;
      transition: opacity 1.5s ease;
      opacity: 1;
    }
    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    .fade-out {
      opacity: 0;
    }
  </style>
</head>
<body>

<canvas id="canvas3d"></canvas>

<!-- Import maps polyfill -->
<script async src="https://unpkg.com/es-module-shims@2.6.0/dist/es-module-shims.js"></script>
<script type="importmap">
  {
    "imports": {
      "@splinetool/runtime": "https://unpkg.com/@splinetool/runtime@1.10.10/build/runtime.js"
    }
  }
</script>

<script type="module">
  import { Application } from '@splinetool/runtime';

  const canvas = document.getElementById('canvas3d');
  const app = new Application(canvas);

  const pageMap = {
    "Contact": "Contact.html",
    "About": "About.html",
    "Suspect": "suspect.html",
    "Figment": "Figment.html",
    "Fragment": "Fragment.html",
    "Step": "step.html",
    "Ghetto": "Ghetto.html"
  };

  app.load('https://prod.spline.design/04Tal5A6vOOdagoY/scene.splinecode').then(() => {
    app.addEventListener('mouseDown', (e) => {
      const clickedName = e.target.name;
      console.log("Clicked object:", clickedName);

      if (pageMap[clickedName]) {
        document.body.classList.add('fade-out');
        setTimeout(() => {
          // Use replace instead of href to avoid history caching issues
          window.location.replace(pageMap[clickedName]);
        }, 1500);
      }
    });
  });
</script>

<script>
  // Disable bfcache in some browsers by adding unload listener
  window.addEventListener('unload', function () {});

  // Remove fade-out class on page load so scene is visible
  window.addEventListener('load', () => {
    document.body.classList.remove('fade-out');

    // Fallback: if opacity is still zero, reload page
    setTimeout(() => {
      const style = window.getComputedStyle(document.body);
      if (style.opacity === '0') {
        window.location.reload();
      }
    }, 500);
  });

  // Reload page if loaded from back-forward cache
  window.addEventListener('pageshow', (event) => {
    if (event.persisted) {
      window.location.reload();
    }
  });
</script>

</body>
</html>
