<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Odyssey Navigation</title>

  <!-- Import maps polyfill -->
  <script
    async
    src="https://unpkg.com/es-module-shims@2.6.0/dist/es-module-shims.js"
  ></script>

  <!-- Import map pointing to Spline Runtime -->
  <script type="importmap">
    {
      "imports": {
        "@splinetool/runtime": "https://unpkg.com/@splinetool/runtime@1.10.10/build/runtime.js"
      }
    }
  </script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: black;
      overflow: hidden;
      transition: opacity 1.5s ease;
      opacity: 1;
    }

    .fade-out {
      opacity: 0;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>
</head>
<body>

  <canvas id="canvas3d"></canvas>

  <script type="module">
    import { Application } from "@splinetool/runtime";

    const canvas = document.getElementById("canvas3d");
    const app = new Application(canvas);

    app.load("https://prod.spline.design/04Tal5A6vOOdagoY/scene.splinecode");

    const pageMap = {
      "Contact": "contact.html",
      "About": "About.html",
      "Suspect": "Suspect.html",
      "Figment": "Figment.html",
      "Step": "step.html",
      "Fragment": "Fragment.html",
      "Ghetto": "Ghetto.html"
    };

    let isRedirecting = false;

    app.addEventListener("onLoad", () => {
      console.log("✅ Spline navigation scene loaded.");

      app.addEventListener("onMouseDown", (e) => {
        const clicked = e.target?.name;
        console.log("🖱️ Clicked:", clicked);

        if (!isRedirecting && pageMap[clicked]) {
          isRedirecting = true;

          document.body.classList.add("fade-out");
          setTimeout(() => {
            window.location.href = pageMap[clicked];
          }, 1500); // match fade-out timing
        }
      });
    });
  </script>

</body>
</html>
