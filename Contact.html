<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact</title>
  
  <!-- Link to Nova Cut font from Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Nova+Cut&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Nova Cut', cursive;
      font-size: 16px;
      color: #eee;
      background-color: #000; /* Black background */
      margin: 0;
      padding: 2em;
      text-align: center;
    }

    h1 {
      font-weight: normal;
      font-size: 3em;
      margin-bottom: 1em;
      color: #fff;
      text-align: center;
    }

    form {
      max-width: 600px;
      margin: 0 auto;
      background: #111;
      padding: 2em;
      border-radius: 10px;
      box-shadow: 0 0 15px #0ff;
      text-align: left;
    }

    label {
      display: block;
      margin-top: 1em;
      margin-bottom: 0.5em;
      font-weight: 600;
      font-size: 1.2em;
      color: #0ff;
    }

    input, textarea {
      width: 100%;
      padding: 0.75em;
      font-size: 1em;
      border: 1px solid #0ff;
      border-radius: 6px;
      background-color: #222;
      color: #eee;
      box-sizing: border-box;
      font-family: 'Nova Cut', cursive;
    }

    button {
      display: block;
      margin: 2em auto 0 auto;
      padding: 0.75em 3em;
      background-color: #0ff;
      color: #000;
      border: none;
      border-radius: 6px;
      font-size: 1.3em;
      cursor: pointer;
      font-family: 'Nova Cut', cursive;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #00b8b8;
    }

    .social-links {
      display: flex;
      justify-content: center;
      gap: 2em;
      margin-bottom: 2em;
    }

    .social-links a {
      text-decoration: none;
      color: #0ff;
      font-size: 1.4em;
      font-family: 'Nova Cut', cursive;
    }

    .social-links a:hover {
      color: #00b8b8;
    }
  </style>
</head>
<body>

  <h1>Contact Me</h1>

  <div class="social-links">
    <a href="https://www.linkedin.com/in/joshua-odiase-0a5488240/" target="_blank">LinkedIn</a>
    <a href="https://www.instagram.com/joshodiase/" target="_blank">Instagram</a>
    <a href="mailto:0dysseyyinquiries@gmail.com">Email</a>
  </div>

  <form action="mailto:0dysseyyinquiries@gmail.com" method="POST" enctype="text/plain">
    <label for="name">Joshua Odiase</label>
    <input type="text" id="name" name="name" required />

    <label for="email">Your Email</label>
    <input type="email" id="email" name="email" required />

    <label for="message">Inquiry</label>
    <textarea id="message" name="message" rows="6" required></textarea>

    <button type="submit">Send</button>
  </form>

</body>
</html>
