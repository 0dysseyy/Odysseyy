<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Film</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .spline-container {
      width: 100%;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    }

    .spline-container iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .film-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
      padding: 2rem;
    }

    .film-item {
      text-align: center;
    }

    h1 {
      padding: 1rem;
      text-align: center;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    @media (max-width: 768px) {
      .film-gallery {
        grid-template-columns: 1fr;
        padding: 1rem;
      }

      h1 {
        font-size: 1.5rem;
      }

      .film-item p {
        font-size: 1rem;
        margin-top: 0.5rem;
      }

      a {
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <h1>Visuals</h1>
  <a href="index.html">← Back to Directory</a>

  <div class="film-gallery">
    <!-- 🔁 Fragment -->
    <div class="film-item">
      <a href="Fragment.html">
        <div class="spline-container">
          <iframe src="https://my.spline.design/fragmentclickableicon-5rKJowaia70EM6rRptbl4HUo/" allowfullscreen></iframe>
        </div>
        <p>Fragment</p>
      </a>
    </div>

    <!-- Step -->
    <div class="film-item">
      <a href="step.html">
        <div class="spline-container">
          <iframe src="https://my.spline.design/stepofluckclickable-mohe500KeoYLCyGKQJs9eBSI/" allowfullscreen></iframe>
        </div>
        <p>The Step of Luck</p>
      </a>
    </div>

    <!-- Suspect -->
    <div class="film-item">
      <a href="Suspect.html">
        <div class="spline-container">
          <iframe src="https://my.spline.design/suspectclickable-pu0lvOO0AcmbURGKEQOMGjmo/" allowfullscreen></iframe>
        </div>
        <p>The Suspect</p>
      </a>
    </div>

    <!-- Figment (typo fixed: "spline-contaer" → "spline-container") -->
    <div class="film-item">
      <a href="Figment.html">
        <div class="spline-container">
          <iframe src="https://my.spline.design/figmentclickable-Fv3WxQ0WesdmYRWVUpCTzbKv/" allowfullscreen></iframe>
        </div>
        <p>Figment</p>
      </a>
    </div>

    <!-- Ghetto Suburbs (moved iframe into container) -->
    <div class="film-item">
      <a href="Ghetto.html">
        <div class="spline-container">
          <iframe src="https://my.spline.design/untitled-JGiRpTAtvzv1RhIDPQvlK2yx/" allowfullscreen></iframe>
        </div>
        <p>Ghetto Suburbs</p>
      </a>
    </div>
  </div>
</body>
</html>
