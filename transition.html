<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Loading...</title>
  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .video-container {
      position: relative;
      width: 100%;
      max-width: 100vw;
      height: 56.25vw; /* 16:9 aspect ratio */
      max-height: 100vh;
      overflow: hidden;
    }
    iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      border: none;
      pointer-events: none; /* disables clicks */
    }
  </style>
</head>
<body>

<div class="video-container">
  <iframe
    src="https://www.youtube.com/embed/Gtnke4Tj0fg?start=6&autoplay=1&mute=1&controls=0&disablekb=1&modestbranding=1&rel=0&showinfo=0&loop=0&iv_load_policy=3"
    allow="autoplay; encrypted-media"
    allowfullscreen
  ></iframe>
</div>

<script>
  // Redirect after 3 seconds (video plays 6s to 9s)
  setTimeout(() => {
    window.location.href = 'Directory.html';
  }, 3000);
</script>

</body>
</html>
